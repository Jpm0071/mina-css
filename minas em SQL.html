<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campo Minado SQL - Responsivo</title>
    <style>
        :root {
            --grid-gap: 8px;
            --background-color: #2c3e50; /* Cor mais voltada para DB */
            --cell-color-initial: #6c757d;   
            --cell-color-named-sql: #3498db; /* Azul SQL */
            --cell-color-revealed: #ffffff; 
            --text-color-light: #ffffff;
            --text-color-dark: #000000;
            --border-color: #dee2e6;
            --border-radius: 8px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--background-color);
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        
        h1 {
            color: #f8f9fa;
            margin-bottom: 20px;
            text-align: center;
        }

        .grid-container {
            display: grid;
            width: 100%;
            max-width: 800px; /* Reduzi um pouco para 10 itens ficar melhor */
            grid-template-columns: repeat(5, 1fr); /* 5x2 fica melhor visualmente para 10 itens */
            gap: var(--grid-gap);
        }

        .cell {
            aspect-ratio: 1 / 1; 
            width: 100%;
            border-radius: var(--border-radius);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-weight: bold;
            padding: 10px;
            box-sizing: border-box;
            transition: transform 0.2s, background-color 0.3s;
            user-select: none;
            background-color: var(--cell-color-initial);
            color: var(--text-color-light);
            font-size: clamp(16px, 4vw, 24px);
        }

        .cell:not(.revealed):hover {
            transform: scale(1.05);
        }

        /* Classe para o nome do comando SQL */
        .cell.named {
            background-color: var(--cell-color-named-sql);
            font-size: clamp(10px, 2.5vw, 14px);
            word-break: break-word;
        }
        
        /* Classe para a resposta revelada */
        .cell.revealed {
            background-color: var(--cell-color-revealed);
            color: var(--text-color-dark);
            border: 1px solid var(--border-color);
            font-weight: normal;
            cursor: default;
            font-size: clamp(9px, 2vw, 13px);
            line-height: 1.2;
        }

        @media (max-width: 500px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

<h1>Campo Minado: SQL & Banco de Dados</h1>
<div class="grid-container" id="minefield"></div>

<script>
    const minefield = document.getElementById('minefield');
    
    // Lista corrigida (Removido o colchete extra e a vírgula do final)
    const items = [
        { type: 'sql', name: 'SELECT', answer: 'Seleciona dados de uma tabela.' },
        { type: 'sql', name: 'INSERT', answer: 'Insere novos registros em uma tabela.' },
        { type: 'sql', name: 'UPDATE', answer: 'Atualiza dados existentes.' },
        { type: 'sql', name: 'DELETE', answer: 'Remove registros de uma tabela.' },
        { type: 'sql', name: 'WHERE', answer: 'Filtra resultados com uma condição.' },
        { type: 'sql', name: 'JOIN', answer: 'Combina linhas de tabelas diferentes.' },
        { type: 'sql', name: 'ORDER BY', answer: 'Ordena o resultado (ASC/DESC).' },
        { type: 'sql', name: 'GROUP BY', answer: 'Agrupa registros por valores iguais.' },
        { type: 'sql', name: 'CREATE TABLE', answer: 'Cria uma nova tabela no banco.' },
        { type: 'sql', name: 'PRIMARY KEY', answer: 'ID único de um registro na tabela.' }
    ];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    shuffle(items);

    items.forEach((item, index) => {
        const cell = document.createElement('div');
        cell.classList.add('cell');
        cell.textContent = index + 1;
        cell.dataset.name = item.name;
        cell.dataset.answer = item.answer;

        cell.addEventListener('click', function() {
            if (this.classList.contains('revealed')) return;
            
            if (this.classList.contains('named')) {
                this.classList.remove('named');
                this.classList.add('revealed');
                this.textContent = this.dataset.answer;
                return;
            }
            
            this.classList.add('named');
            this.textContent = this.dataset.name;
        });

        minefield.appendChild(cell);
    });
</script>

</body>
</html>
